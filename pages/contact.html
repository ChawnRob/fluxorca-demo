<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Réclamation</title>
  <link rel="stylesheet" href="../style.css?v=10">
</head>

<body>

<div class="container">
  <div class="logo">FLUXORCA</div>

  <h1>Nous allons vous recontacter 🙏</h1>
  <p class="subtitle">
    Afin de traiter votre demande efficacement, merci de remplir ces informations.
  </p>

  <form class="form-box" action="merci-contact.html">

    <input type="text" placeholder="Nom / Prénom" required>

    <input type="tel" placeholder="Téléphone" required>

    <input type="email" placeholder="Email (optionnel)">

    <textarea placeholder="Expliquez votre problème en détail..." required></textarea>

    <label class="upload">
      📸 Ajouter une preuve (ticket, photo, etc.)
      <input type="file">
    </label>

    <button class="btn royal">📞 Envoyer ma demande</button>

  </form>

  <a href="../index.html" class="link-secondary">← Retour</a>

</div>

</body>
</html>
