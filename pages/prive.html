<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retour privé</title>
  <link rel="stylesheet" href="../style.css?v=4">
</head>
<body>
  <div class="container">
    <div class="logo">FLUXORCA</div>
    <h1>Que pouvons-nous améliorer ?</h1>
    <p class="subtitle">
      Vous pouvez nous laisser un retour privé, sans obligation.
    </p>

    <form class="form-box">
      <label class="check-item"><input type="checkbox" name="sujet" value="Service"> Service</label>
      <label class="check-item"><input type="checkbox" name="sujet" value="Accueil"> Accueil</label>
      <label class="check-item"><input type="checkbox" name="sujet" value="Qualité"> Qualité</label>
      <label class="check-item"><input type="checkbox" name="sujet" value="Propreté"> Propreté</label>
      <label class="check-item"><input type="checkbox" name="sujet" value="Autre"> Autre</label>

      <textarea name="message" placeholder="Expliquez votre ressenti et ce que vous aimeriez voir amélioré..."></textarea>

      <button type="submit" class="btn good">Envoyer</button>
    </form>

    <a href="../index.html" class="link-secondary">← Retour</a>
  </div>
</body>
</html>
